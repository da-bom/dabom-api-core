# ============================================================================
# Deploy to Azure VM (develop)
# ============================================================================
# 역할:
#   - Integrate workflow 성공 후 자동 실행
#   - GitHub Actions에서 JAR 빌드 → SCP로 VM 전송 → Docker Compose 실행
#   - VM에서는 Gradle 빌드 없이 JAR 복사만 수행 (Dockerfile.deploy)
#
# GitHub Secrets:
#   - AZURE_VM_HOST       : Azure VM IP 또는 호스트명
#   - AZURE_VM_USER       : SSH 사용자명
#   - AZURE_VM_SSH_KEY    : SSH 개인 키
#   - DEPLOY_ENV_FILE     : VM에 배포할 .env 파일 내용 (환경변수 전체)
# ============================================================================

name: Deploy to Azure VM

on:
  workflow_run:
    workflows: ["Integrate Backend"]
    types:
      - completed
    branches:
      - develop
  workflow_dispatch:

env:
  DEPLOY_PATH: /opt/dabom-api-core

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push')

    steps:
      # ── 1. 빌드 (GitHub Actions Runner, 7GB RAM) ──
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: develop

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build JAR
        run: |
          chmod +x gradlew
          ./gradlew bootJar -x checkstyleMain -x checkstyleTest -x spotlessCheck --no-daemon

      # ── 2. VM 준비 ──
      - name: Prepare deploy directory
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          script: |
            sudo mkdir -p ${{ env.DEPLOY_PATH }}/build/libs
            sudo chown -R $(whoami):$(whoami) ${{ env.DEPLOY_PATH }}

      # ── 3. 아티팩트 전송 (JAR + Docker 파일) ──
      - name: Copy artifacts to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          source: "build/libs,Dockerfile.deploy,docker-compose.deploy.yml"
          target: ${{ env.DEPLOY_PATH }}
          overwrite: true

      # ── 4. 배포 ──
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          DEPLOY_ENV_FILE: ${{ secrets.DEPLOY_ENV_FILE }}
        with:
          host: ${{ secrets.AZURE_VM_HOST }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_VM_SSH_KEY }}
          envs: DEPLOY_ENV_FILE
          command_timeout: 10m
          script: |
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # .env 파일 생성
            echo "$DEPLOY_ENV_FILE" > .env

            # 배포 (Dockerfile.deploy: JAR 복사만, Gradle 빌드 없음)
            sudo docker compose -f docker-compose.deploy.yml up -d --build --remove-orphans

            # 미사용 이미지 정리
            sudo docker image prune -f

      - name: Deployment Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: ${{ secrets.AZURE_VM_HOST }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Path**: ${{ env.DEPLOY_PATH }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
