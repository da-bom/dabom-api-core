project:
  name: Backend API
  version: 1.0.0

cors:
  allowed-origins: ${FRONTEND_URL:http://localhost:3000}

spring:
  application:
    name: api-core

  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3310/app_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${DATABASE_USER:app_user}
    password: ${DATABASE_PASSWORD:app_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      max-lifetime: 270000        # 270s (< MySQL wait_timeout 300s)
      keepalive-time: 60000       # 60s 마다 SELECT 1로 유효성 검증
      idle-timeout: 240000        # 240s (< MySQL wait_timeout 300s)
      connection-timeout: 5000
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 12

  jwt:
    secret-key: ${JWT_SECRET_KEY:6c8b6817-828b-418c-adfa-edcc993cd0c9}
    token:
      access-expiration-time: ${JWT_ACCESS_TOKEN_EXPIRES_IN:720000000}
      refresh-expiration-time: ${JWT_REFRESH_TOKEN_EXPIRES_IN:1209600000}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:dabom-api-core-dev}
      auto-offset-reset: ${KAFKA_AUTO_OFFSET_RESET:earliest}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

r2:
  endpoint: ${R2_ENDPOINT:https://localhost.r2.cloudflarestorage.com}
  access-key: ${R2_ACCESS_KEY:changeme}
  secret-key: ${R2_SECRET_KEY:changeme}
  bucket: ${R2_BUCKET:dabom-storage}
  cdn-base-url: ${R2_CDN_BASE_URL:https://cdn.dabom.site}

server:
  port: ${SERVER_PORT:8080}

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,loggers
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
    prometheus:
      enabled: true
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
        spring.data.repository.invocations: true
        kafka.consumer.processing.time: true
        kafka.consumer.producer-to-consumer.latency: true
      minimum-expected-value:
        http.server.requests: 1ms
      maximum-expected-value:
        http.server.requests: 10s
  otlp:
    metrics:
      export:
        enabled: true
        url: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}/v1/metrics
        connect-timeout: 5s
        read-timeout: 10s

# OpenTelemetry Spring Boot Starter configuration
otel:
  exporter:
    otlp:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318}
      protocol: http/protobuf
  sdk:
    disabled: ${OTEL_SDK_DISABLED:true}
  logs:
    exporter: otlp
  traces:
    exporter: otlp
  metrics:
    exporter: none  # Use micrometer-registry-otlp instead
  resource:
    attributes:
      service.name: ${spring.application.name}

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
  pattern:
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
